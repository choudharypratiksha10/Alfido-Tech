<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background-color: #f8f9fa;">

<div class="container mt-5">

    <!-- Heading -->
    <div class="text-center mb-4">
        <h2 class="fw-bold">Task Manager</h2>
        <p class="text-muted">Simple Flask Web Application</p>
    </div>

    <!-- Add Task Form -->
    <div class="card shadow-sm mb-4">
        <div class="card-body">
            <form method="POST" action="/add">
                <div class="input-group">
                    <input 
                        type="text" 
                        name="task" 
                        class="form-control" 
                        placeholder="Enter a new task..." 
                        required
                    >
                    <button type="submit" class="btn btn-primary">Add Task</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Task List -->
    <div class="card shadow-sm">
        <div class="card-body">

            {% if tasks %}
                <ul class="list-group">

                    {% for task in tasks %}
                        <li class="list-group-item d-flex justify-content-between align-items-center">
                            
                            <span>{{ task }}</span>

                            <a href="/delete/{{ loop.index0 }}" class="btn btn-danger btn-sm">
                                Delete
                            </a>

                        </li>
                    {% endfor %}

                </ul>
            {% else %}
                <p class="text-center text-muted">No tasks available. Add a new task above.</p>
            {% endif %}

        </div>
    </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
